services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_DRIVER=sqlite
      - DB_DSN=/app/data/pao_event.db
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-random-secret}
      - SUPER_ADMIN_USER=${SUPER_ADMIN_USER:-admin}
      - SUPER_ADMIN_PASS=${SUPER_ADMIN_PASS:-admin123}
    volumes:
      - db-data:/app/data
      - uploads:/app/uploads
    restart: unless-stopped

volumes:
  db-data:
  uploads:
